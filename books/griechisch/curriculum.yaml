book: griechisch
l1: de
l2: el
target_cefr: C1

units:
  - level: A1
    chapters: [1, 22]
  - level: A2
    chapters: [23, 40]
  - level: B1
    chapters: [41, 58]
  - level: B2
    chapters: [59, 74]
  - level: C1
    chapters: [75, 88]

chapters:
  # ─────────────────────────────────────────────────────────────────────
  # Unit A0/A1 — Kapitel 1–22: Lena kommt in Athen an
  # ─────────────────────────────────────────────────────────────────────

  - id: 1
    slug: kalimera-erste-begegnung
    cefr: A0
    title_de: "Καλημέρα! Lena landet in Athen"
    can_do:
      - "kann sich begrüßen und verabschieden (καλημέρα, γεια σου, αντίο)"
      - "kann jemanden duzen oder siezen und den Unterschied σου/σας bewusst wählen"
      - "kann sich mit dem Namen vorstellen (με λένε…)"
    grammar_new:
      - id: anrede-su-sas
        label_de: "Anrede: γεια σου (du) vs. γεια σας (Sie/ihr) — Höflichkeit"
    grammar_recycle: []
    vocab_target: 12
    vocab_themes: ["Begrüßung", "Verabschiedung", "Höflichkeit", "Vorstellung"]
    vocab_recycle_min: 0
    cultural_topic: "Anredekonventionen: wann γεια σου, wann γεια σας; Begrüßung mit Vornamen"
    depends_on: []

  - id: 2
    slug: ena-kafe-parakalo
    cefr: A0
    title_de: "Έναν καφέ, παρακαλώ — im Kafenío von Níkos"
    can_do:
      - "kann im Kafenío ein Getränk bestellen (έναν καφέ, παρακαλώ)"
      - "kann sich bedanken und höflich reagieren (ευχαριστώ, παρακαλώ)"
      - "kann mit ναι und όχι zustimmen oder verneinen"
    grammar_new:
      - id: hoeflichkeitsformeln
        label_de: "Höflichkeitsformeln: παρακαλώ, ευχαριστώ, ναι/όχι als feste Wendungen"
    grammar_recycle: ["anrede-su-sas"]
    vocab_target: 14
    vocab_themes: ["Kafenío", "Getränke", "Bestellen", "Danken"]
    vocab_recycle_min: 0
    cultural_topic: "Kafenío-Kultur: ein Ort zum Verweilen; Níkos und sein Café im Viertel"
    depends_on: [1]

  - id: 3
    slug: ti-kaneis-wie-gehts
    cefr: A0
    title_de: "Τι κάνεις; — Lena fragt, wie es geht"
    can_do:
      - "kann fragen, wie es jemandem geht, und auf dieselbe Frage antworten"
      - "kann das eigene Befinden ausdrücken (καλά, πολύ καλά, έτσι κι έτσι)"
      - "kann das Verb κάνω in der du- und ich-Form gebrauchen"
    grammar_new:
      - id: praesens-omega-sg
        label_de: "Präsens regelmäßiger Verben auf -ω, Singular (κάνω, μένω)"
    grammar_recycle: ["anrede-su-sas", "hoeflichkeitsformeln"]
    vocab_target: 14
    vocab_themes: ["Befinden", "Smalltalk", "Alltagsverben"]
    vocab_recycle_min: 6
    cultural_topic: "Smalltalk-Rituale: τι κάνεις als Gruß, nicht als echte Frage"
    depends_on: [1, 2]

  - id: 4
    slug: o-i-to-der-die-das
    cefr: A1
    title_de: "ο, η, το — María stellt die Nachbarschaft vor"
    can_do:
      - "kann das Genus eines Nomens am Artikel erkennen (ο/η/το)"
      - "kann einfache Dinge der Nachbarschaft benennen (η πλατεία, το μαγαζί)"
      - "kann Personen und Dinge mit dem bestimmten Artikel benennen"
    grammar_new:
      - id: artikel-genus-nom-sg
        label_de: "Bestimmter Artikel und Genus im Nominativ Singular (ο/η/το)"
    grammar_recycle: ["praesens-omega-sg", "hoeflichkeitsformeln"]
    vocab_target: 16
    vocab_themes: ["Nachbarschaft", "Stadtviertel", "Orte", "Personen"]
    vocab_recycle_min: 6
    cultural_topic: "Die γειτονιά (Nachbarschaft): María als Nachbarin; soziales Netz im Viertel"
    depends_on: [3]

  - id: 5
    slug: enas-mia-ena
    cefr: A1
    title_de: "ένας, μία, ένα — ein Tisch, eine Tasse"
    can_do:
      - "kann den unbestimmten Artikel passend zum Genus verwenden (ένας/μία/ένα)"
      - "kann im Café konkret eine Sache benennen und erbitten (μία πορτοκαλάδα)"
      - "kann nach dem Genus eines neuen Wortes fragen und es zuordnen"
    grammar_new:
      - id: artikel-unbestimmt-nom-sg
        label_de: "Unbestimmter Artikel im Nominativ Singular (ένας/μία/ένα)"
    grammar_recycle: ["artikel-genus-nom-sg", "praesens-omega-sg"]
    vocab_target: 16
    vocab_themes: ["Café", "Getränke", "Gegenstände", "Bestellen"]
    vocab_recycle_min: 7
    cultural_topic: "Bestellkultur: was man im Kafenío typischerweise trinkt"
    depends_on: [4]

  - id: 6
    slug: eimai-apo-ti-germania
    cefr: A1
    title_de: "Είμαι από τη Γερμανία — woher kommst du?"
    can_do:
      - "kann sagen, woher man kommt und wo man wohnt (είμαι από…, μένω στην…)"
      - "kann Länder und Nationalitäten benennen"
      - "kann das Verb είμαι im Singular gebrauchen"
    grammar_new:
      - id: eimai-singular
        label_de: "Das Verb είμαι (sein), Singular"
    grammar_recycle: ["praesens-omega-sg", "artikel-genus-nom-sg"]
    vocab_target: 16
    vocab_themes: ["Herkunft", "Länder", "Nationalitäten", "Wohnort"]
    vocab_recycle_min: 7
    cultural_topic: "Griechenland und seine Nachbarn; Neugier auf Herkunft als Gastfreundschaft"
    depends_on: [3, 4]

  - id: 7
    slug: i-oikogeneia-mou
    cefr: A1
    title_de: "Η οικογένειά μου — Lena zeigt María ein Foto"
    can_do:
      - "kann die nächsten Familienmitglieder benennen (μητέρα, πατέρας, αδελφός)"
      - "kann Besitz ausdrücken (το σπίτι μου, η αδελφή σου)"
      - "kann über die eigene Familie kurz sprechen"
    grammar_new:
      - id: possessiv-klitikon
        label_de: "Besitz durch nachgestelltes Klitikon (μου, σου, του/της)"
    grammar_recycle: ["artikel-genus-nom-sg", "eimai-singular"]
    vocab_target: 16
    vocab_themes: ["Familie", "Verwandtschaft", "Besitz"]
    vocab_recycle_min: 7
    cultural_topic: "Die Bedeutung der Großfamilie; Familie als Gesprächsthema"
    depends_on: [4, 6]

  - id: 8
    slug: oraia-i-plateia
    cefr: A1
    title_de: "Ωραία η πλατεία! — Lena beschreibt das Viertel"
    can_do:
      - "kann Dinge und Orte mit Adjektiven beschreiben (ωραίος, μεγάλος, μικρός)"
      - "kann das Adjektiv ans Genus des Nomens anpassen"
      - "kann eine einfache Bewertung abgeben (πολύ ωραίο!)"
    grammar_new:
      - id: adjektiv-kongruenz-nom-sg
        label_de: "Adjektiv-Kongruenz im Nominativ Singular (-ος/-η/-ο)"
    grammar_recycle: ["artikel-genus-nom-sg", "possessiv-klitikon"]
    vocab_target: 16
    vocab_themes: ["Beschreibung", "Adjektive", "Stadtviertel", "Bewertung"]
    vocab_recycle_min: 7
    cultural_topic: "Die πλατεία als Herz des Viertels; öffentliches Leben im Freien"
    depends_on: [4, 7]

  - id: 9
    slug: ti-einai-afto
    cefr: A1
    title_de: "Τι είναι αυτό; — auf dem Markt fragen"
    can_do:
      - "kann nach Dingen fragen (τι είναι αυτό;) und auf Dinge zeigen (αυτό, εκείνο)"
      - "kann mit Fragewörtern einfache Fragen bilden (τι, ποιος, πού)"
      - "kann auf dem Markt nach dem Namen einer Sache fragen"
    grammar_new:
      - id: fragewoerter-demonstrativa
        label_de: "Fragewörter (τι, ποιος, πού) und Demonstrativa (αυτός/εκείνος)"
    grammar_recycle: ["eimai-singular", "adjektiv-kongruenz-nom-sg"]
    vocab_target: 16
    vocab_themes: ["Markt", "Lebensmittel", "Fragen", "Zeigen"]
    vocab_recycle_min: 7
    cultural_topic: "Die λαϊκή αγορά (Wochenmarkt): frische Ware, Feilschen, Rhythmus"
    depends_on: [6, 8]

  - id: 10
    slug: theloume-na-fame
    cefr: A1
    title_de: "Θέλουμε να φάμε — etwas essen gehen"
    can_do:
      - "kann sagen, was man möchte (θέλω…) und einen Wunsch mit να äußern (θέλω να φάω)"
      - "kann das Präsens auf -ω im Plural gebrauchen (θέλουμε, μένουν)"
      - "kann zu zweit eine Bestellung formulieren"
    grammar_new:
      - id: praesens-omega-pl
        label_de: "Präsens regelmäßiger Verben auf -ω, Plural; θέλω να + Verb als Chunk"
    grammar_recycle: ["praesens-omega-sg", "fragewoerter-demonstrativa"]
    vocab_target: 16
    vocab_themes: ["Essen", "Taverne", "Wünsche", "Bestellen"]
    vocab_recycle_min: 8
    cultural_topic: "Gemeinsam essen: μεζέδες teilen statt Einzelportionen"
    depends_on: [3, 5]

  - id: 11
    slug: poso-kanei
    cefr: A1
    title_de: "Πόσο κάνει; — Zahlen und Preise"
    can_do:
      - "kann die Zahlen 0–100 verstehen und sagen"
      - "kann nach dem Preis fragen und einen Preis verstehen (πόσο κάνει;)"
      - "kann einen Einkauf bezahlen und das Wechselgeld prüfen"
    grammar_new:
      - id: zahlen-0-100
        label_de: "Zahlen 0–100; Frage nach dem Preis (πόσο κάνει;)"
    grammar_recycle: ["fragewoerter-demonstrativa", "artikel-unbestimmt-nom-sg"]
    vocab_target: 16
    vocab_themes: ["Zahlen", "Preise", "Einkaufen", "Geld"]
    vocab_recycle_min: 8
    cultural_topic: "Bezahlen auf dem Markt und im Kiosk (περίπτερο); Bargeldkultur"
    depends_on: [9]

  - id: 12
    slug: ti-ora-einai
    cefr: A1
    title_de: "Τι ώρα είναι; — die Uhrzeit"
    can_do:
      - "kann die Uhrzeit erfragen und nennen (τι ώρα είναι; — στις τρεις)"
      - "kann Tageszeiten benennen (πρωί, μεσημέρι, βράδυ)"
      - "kann eine einfache Verabredung zeitlich festlegen"
    grammar_new:
      - id: uhrzeit-tageszeiten
        label_de: "Uhrzeit (στη μία, στις δύο) und Tageszeiten"
    grammar_recycle: ["zahlen-0-100", "eimai-singular"]
    vocab_target: 14
    vocab_themes: ["Uhrzeit", "Tageszeiten", "Verabredung"]
    vocab_recycle_min: 8
    cultural_topic: "Griechischer Tagesrhythmus: spätes Mittag- und Abendessen, μεσημεριανός ύπνος"
    depends_on: [6, 11]

  - id: 13
    slug: pou-einai-i-trapeza
    cefr: A1
    title_de: "Πού είναι η τράπεζα; — sich orientieren"
    can_do:
      - "kann nach dem Weg fragen (πού είναι…;)"
      - "kann Ortsangaben mit Präposition σε verstehen (στην πλατεία, στο κέντρο)"
      - "kann eine einfache Wegauskunft verstehen (δεξιά, αριστερά, ευθεία)"
    grammar_new:
      - id: praeposition-se-akk
        label_de: "Präposition σε + Akkusativ (Verschmelzung στον/στην/στο); Ortsangabe"
    grammar_recycle: ["artikel-genus-nom-sg", "fragewoerter-demonstrativa"]
    vocab_target: 16
    vocab_themes: ["Orientierung", "Stadt", "Wege", "Gebäude"]
    vocab_recycle_min: 8
    cultural_topic: "Sich in Athen orientieren: Viertel, Plätze, Wahrzeichen"
    depends_on: [4, 9]

  - id: 14
    slug: pao-sto-kentro
    cefr: A1
    title_de: "Πάω στο κέντρο — mit Metro und Bus"
    can_do:
      - "kann sagen, wohin man geht oder fährt (πάω στο…, πηγαίνω με το μετρό)"
      - "kann Verkehrsmittel benennen und Präposition με + Akkusativ gebrauchen"
      - "kann ein Ticket kaufen und eine kurze Fahrt planen"
    grammar_new:
      - id: praeposition-me-apo-akk
        label_de: "Präpositionen με und από + Akkusativ (Mittel, Ausgangspunkt)"
    grammar_recycle: ["praeposition-se-akk", "praesens-omega-sg"]
    vocab_target: 16
    vocab_themes: ["Verkehrsmittel", "Metro", "Reisen in der Stadt", "Ticket"]
    vocab_recycle_min: 8
    cultural_topic: "Öffentlicher Nahverkehr in Athen; Piräus als Tor zu den Inseln"
    depends_on: [13]

  - id: 15
    slug: ta-magazia-plural
    cefr: A1
    title_de: "Τα μαγαζιά — viele Geschäfte, viele Dinge"
    can_do:
      - "kann den Plural von Nomen im Nominativ bilden und erkennen"
      - "kann über mehrere Dinge oder Personen sprechen (τα μαγαζιά, οι φίλοι)"
      - "kann eine Einkaufsliste mit mehreren Dingen formulieren"
    grammar_new:
      - id: nomen-plural-nom
        label_de: "Pluralbildung der Nomen im Nominativ (-οι/-ες/-α)"
    grammar_recycle: ["artikel-genus-nom-sg", "adjektiv-kongruenz-nom-sg"]
    vocab_target: 16
    vocab_themes: ["Geschäfte", "Einkaufen", "Stadt", "Mengen"]
    vocab_recycle_min: 8
    cultural_topic: "Kleine Fachgeschäfte vs. Supermarkt; das περίπτερο als Allzweck-Kiosk"
    depends_on: [4, 8]

  - id: 16
    slug: den-exo-chrono
    cefr: A1
    title_de: "Δεν έχω χρόνο — verneinen und besitzen"
    can_do:
      - "kann Aussagen verneinen (δεν…)"
      - "kann sagen, was man hat oder nicht hat (έχω, δεν έχω)"
      - "kann das Verb έχω im Singular und Plural gebrauchen"
    grammar_new:
      - id: echo-negation-den
        label_de: "Das Verb έχω (haben) und Verneinung mit δεν"
    grammar_recycle: ["praesens-omega-pl", "praeposition-se-akk"]
    vocab_target: 16
    vocab_themes: ["Besitz", "Verneinung", "Alltag", "Zeit"]
    vocab_recycle_min: 8
    cultural_topic: "Zeitverständnis und σιγά σιγά: Entschleunigung im Alltag"
    depends_on: [10, 7]

  - id: 17
    slug: agapao-tin-ellada
    cefr: A1
    title_de: "Αγαπάω την Ελλάδα — Verben auf -άω"
    can_do:
      - "kann Verben des Typs αγαπάω/μιλάω im Präsens gebrauchen"
      - "kann sagen, welche Sprachen man spricht (μιλάω ελληνικά, αγγλικά)"
      - "kann ausdrücken, was man mag (μου αρέσει… als Chunk)"
    grammar_new:
      - id: praesens-ao-verben
        label_de: "Präsens der Verben auf -άω/-ώ (αγαπάω, μιλάω)"
    grammar_recycle: ["praesens-omega-sg", "echo-negation-den"]
    vocab_target: 16
    vocab_themes: ["Sprachen", "Vorlieben", "Aktivitäten"]
    vocab_recycle_min: 8
    cultural_topic: "Mehrsprachigkeit im Alltag; Stolz auf die griechische Sprache"
    depends_on: [3, 16]

  - id: 18
    slug: ton-tin-to-klitika
    cefr: A1
    title_de: "Τον ξέρω — Personen und Dinge als Objekt"
    can_do:
      - "kann auf Personen und Dinge mit Pronomen verweisen (τον, την, το)"
      - "kann Wiederholungen vermeiden (Ξέρεις τον Νίκο; — Ναι, τον ξέρω)"
      - "kann das Objektpronomen vor das Verb stellen"
    grammar_new:
      - id: klitika-akkusativ
        label_de: "Akkusativ-Klitika als Objekt (τον/την/το, τους/τις/τα), Stellung vor dem Verb"
    grammar_recycle: ["praesens-ao-verben", "nomen-plural-nom"]
    vocab_target: 16
    vocab_themes: ["Personen", "Bekanntschaften", "Alltag"]
    vocab_recycle_min: 8
    cultural_topic: "Über gemeinsame Bekannte sprechen; das enge soziale Netz im Viertel"
    depends_on: [15, 17]

  - id: 19
    slug: kanei-zesti
    cefr: A1
    title_de: "Κάνει ζέστη — Wetter und Jahreszeiten"
    can_do:
      - "kann über das Wetter sprechen (κάνει ζέστη/κρύο, βρέχει)"
      - "kann die Jahreszeiten und einfache Wetterlagen benennen"
      - "kann sagen, welches Wetter man mag"
    grammar_new:
      - id: unpersoenliche-verben-wetter
        label_de: "Unpersönliche Wetterverben (κάνει ζέστη, βρέχει, χιονίζει)"
    grammar_recycle: ["praesens-ao-verben", "uhrzeit-tageszeiten"]
    vocab_target: 16
    vocab_themes: ["Wetter", "Jahreszeiten", "Klima"]
    vocab_recycle_min: 8
    cultural_topic: "Das Mittelmeerklima; Sommerhitze und das Leben am Abend"
    depends_on: [12, 17]

  - id: 20
    slug: ti-tha-kaneis-simera
    cefr: A1
    title_de: "Τι θα κάνεις σήμερα; — Pläne mit María"
    can_do:
      - "kann über Vorhaben für heute und morgen sprechen (θα + Verb)"
      - "kann eine einfache Verabredung treffen (πάμε για καφέ;)"
      - "kann vorschlagen, etwas gemeinsam zu tun (πάμε…!)"
    grammar_new:
      - id: futur-tha-chunk
        label_de: "Nahe Zukunft mit θα + Präsens (als Chunk, ohne Aspekt-Theorie)"
    grammar_recycle: ["praesens-omega-pl", "klitika-akkusativ"]
    vocab_target: 16
    vocab_themes: ["Pläne", "Freizeit", "Verabredung", "Wochentage"]
    vocab_recycle_min: 8
    cultural_topic: "Spontane Verabredungen; βόλτα und der abendliche Bummel"
    depends_on: [10, 18]

  - id: 21
    slug: boro-na-se-voithiso
    cefr: A1
    title_de: "Μπορώ να σε βοηθήσω; — höflich anbieten und bitten"
    can_do:
      - "kann höflich um etwas bitten und etwas anbieten (μπορώ να…, μπορείς να…)"
      - "kann eine Bitte annehmen oder ablehnen"
      - "kann Hilfe anbieten und Hilfe erbitten"
    grammar_new:
      - id: boro-na-chunk
        label_de: "μπορώ να + Verb (Können/Bitte) als feste Wendung; Klitikon im να-Satz"
    grammar_recycle: ["futur-tha-chunk", "klitika-akkusativ"]
    vocab_target: 16
    vocab_themes: ["Bitten", "Anbieten", "Hilfe", "Höflichkeit"]
    vocab_recycle_min: 8
    cultural_topic: "Hilfsbereitschaft als Selbstverständlichkeit; φιλοξενία im Alltag"
    depends_on: [20, 1]

  - id: 22
    slug: mia-mera-stin-athina
    cefr: A1
    title_de: "Μια μέρα στην Αθήνα — Lenas Tag (Wiederholung)"
    can_do:
      - "kann den eigenen Tagesablauf in einfachen Sätzen erzählen"
      - "kann Begrüßung, Bestellen, Orientierung und Pläne in einem zusammenhängenden Text verbinden"
      - "kann eine kurze Postkarte oder Nachricht über einen Tag in Athen schreiben"
    grammar_new:
      - id: satzverknuepfung-und-aber
        label_de: "Einfache Satzverknüpfung (και, αλλά, γιατί) für zusammenhängende Texte"
    grammar_recycle: ["praesens-omega-pl", "praeposition-se-akk", "klitika-akkusativ", "boro-na-chunk"]
    vocab_target: 14
    vocab_themes: ["Tagesablauf", "Wiederholung", "Athen", "Erzählen"]
    vocab_recycle_min: 12
    cultural_topic: "Ein typischer Tag in Athen: vom καφές am Morgen bis zur βόλτα am Abend"
    depends_on: [12, 14, 20, 21]

  # ─────────────────────────────────────────────────────────────────────
  # Unit A2 — Kapitel 23–40: Lena erzählt, reist nach Náxos, blickt zurück
  # Dramaturgie: Náxos-Bogen (25–32, 40); María & Dimítris begleiten Lena
  # ─────────────────────────────────────────────────────────────────────

  - id: 23
    slug: i-proti-mera-stin-paralia
    cefr: A2
    title_de: "Η πρώτη μέρα στην παραλία — Lena erzählt von gestern"
    can_do:
      - "kann über einen vergangenen Tag in einfachen Sätzen erzählen (χθες πήγα, έμεινα, αγόρασα)"
      - "kann den Aorist regelmäßiger Verben auf -σα in der ich- und du-Form bilden"
      - "kann eine kurze Abfolge vergangener Handlungen mit και verbinden"
    grammar_new:
      - id: aorist-regelmaessig-sa
        label_de: "Aorist regelmäßiger Verben (Stamm + -σα: αγόρασα, έμεινα, μίλησα); Augment ε-"
    grammar_recycle: ["praesens-omega-sg", "satzverknuepfung-und-aber"]
    vocab_target: 20
    vocab_themes: ["Strand", "Tagesablauf", "Erzählen", "Gestern"]
    vocab_recycle_min: 8
    cultural_topic: "Der Strandtag als Sommerritual; παραλία und das öffentliche Bad"
    depends_on: [3, 22]

  - id: 24
    slug: ti-ekanes-chthes
    cefr: A2
    title_de: "Τι έκανες χθες; — was hast du gestern gemacht?"
    can_do:
      - "kann die häufigsten unregelmäßigen Aoriste verwenden (πήγα, είδα, έφαγα, ήρθα, είπα)"
      - "kann fragen, was jemand gestern gemacht hat (τι έκανες χθες;)"
      - "kann von einem erlebten Tag zusammenhängend berichten"
