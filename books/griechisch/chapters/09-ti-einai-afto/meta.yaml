chapter: 9
slug: ti-einai-afto
status: geprueft

vocab_introduced:
  # ── Demonstrativa (Grammatik-Neueinführung; Kern des Kapitels) ──
  # Jeweils mit allen drei Nominativ-Singular-Formen als inflected_forms.
  # Sie folgen demselben -ος/-η/-ο-Muster wie die Adjektive aus Kap. 8.
  - lemma: αυτός
    pos: pron
    gloss_de: 'dieser, das hier (αυτός m / αυτή f / αυτό n); beim Zeigen auf Nahes'
    notes: 'Demonstrativum „nah", Gegenstück zu εκείνος. Drei Genus-Formen nach dem -ος/-η/-ο-Muster (wie μεγάλος, Kap. 8). αυτό ist die neutrale Standardform beim Fragen nach einem noch unbenannten Ding: Τι είναι αυτό; Gehört zu εδώ (Kap. 3). Nur Nominativ Singular, kein Plural, kein anderer Kasus. Vorerst allein, ohne Nomen (Αυτό είναι ντομάτα). Die Konstruktion αυτό + Artikel + Nomen (αυτό το ψάρι) nur als rezeptive feste Wendung gezeigt.'
    inflected_forms:
      - αυτή
      - αυτό

  - lemma: εκείνος
    pos: pron
    gloss_de: 'jener, das dort (εκείνος m / εκείνη f / εκείνο n); beim Zeigen auf Fernes'
    notes: 'Demonstrativum „fern", Gegenstück zu αυτός. Drei Genus-Formen nach dem -ος/-η/-ο-Muster. Gehört zu εκεί (Kap. 4): αυτό εδώ / εκείνο εκεί. Nur Nominativ Singular. Konstruktion εκείνος + Artikel + Nomen (εκείνος ο άντρας) nur rezeptiv als feste Wendung.'
    inflected_forms:
      - εκείνη
      - εκείνο

  # ── Fragewort ποιος (Grammatik-Neueinführung) ──
  # τι (Kap. 3) und πού (Kap. 6) sind bekannt und werden nur recycelt.
  - lemma: ποιος
    pos: pron
    gloss_de: 'wer? / welcher? (ποιος m / ποια f / ποιο n)'
    notes: 'Fragewort nach Person oder Auswahl. Richtet sich wie ein Adjektiv nach Genus der gemeinten Person/Sache, dieselben -ος/-η/-ο-Endungen wie αυτός. Ποιος είναι αυτός; (ein Mann) / Ποια είναι αυτή; (eine Frau) / Ποιο είναι το ψωμί; (sächlich). Wird einsilbig gesprochen (οι+ο verschmelzen) und steht im Monotoniko OHNE Akzent: ποιος/ποια/ποιο. Nur Nominativ Singular.'
    inflected_forms:
      - ποια
      - ποιο

  # ── Adjektiv φρέσκος (Markt; Sondertyp -ος/-ια/-ο, Ausnahme zur Kap.-8-Regel) ──
  - lemma: φρέσκος
    pos: adj
    gloss_de: 'frisch (φρέσκος m / φρέσκια f / φρέσκο n)'
    notes: 'Markt-Schlüsselwort. Eigener kleiner Sondertyp -ος/-ια/-ο: m φρέσκος, n φρέσκο folgen Kap. 8, aber die weibliche Form ist AUSNAHME — trotz Konsonant vor der Endung nicht das erwartete -η, sondern echtes -ια: φρέσκια ντομάτα. NICHT mit καινούρια gleichsetzen — dort endet der Stamm auf Vokal (καινούρι-) und das -α ist reguläre Kap.-8-Form (wie παλιά/ωραία). φρέσκια als Block lernen. Sächlich φρέσκο: φρέσκο ψάρι, φρέσκο ψωμί. Nur Nominativ Singular.'
    inflected_forms:
      - φρέσκια
      - φρέσκο

  # ── Markt / Wochenmarkt (Themen: Markt) ──
  - lemma: λαϊκή
    pos: noun
    gender: f
    gloss_de: 'Wochenmarkt (η λαϊκή, kurz für η λαϊκή αγορά)'
    notes: 'Endung -ή → weiblich: η λαϊκή. Ursprünglich Adjektiv „volkstümlich" zu αγορά (Markt, Kap. 4); im Alltag als Nomen verselbständigt (η λαϊκή = der Wochenmarkt). Hier lexikalisch als Nomen gelernt. Das Trema (zwei Pünktchen) auf dem ι zeigt, dass α und ι getrennt gesprochen werden: la-i-kí.'

  # ── Lebensmittel (Themen: Lebensmittel; Genus-Mix für Demonstrativ-Drill) ──
  - lemma: ντομάτα
    pos: noun
    gender: f
    gloss_de: 'Tomate'
    notes: 'Endung -α → weiblich: η ντομάτα. Kernbeispiel: Αυτό είναι ντομάτα. / αυτή η ντομάτα. Auch τομάτα geschrieben; im Buch durchgängig ντομάτα.'

  - lemma: πατάτα
    pos: noun
    gender: f
    gloss_de: 'Kartoffel'
    notes: 'Endung -α → weiblich: η πατάτα. Genus deckungsgleich mit deutsch „die Kartoffel".'

  - lemma: ελιά
    pos: noun
    gender: f
    gloss_de: 'Olive; auch: Olivenbaum'
    notes: 'Endung -ά (auf der letzten Silbe betont) → weiblich: η ελιά.'

  - lemma: φέτα
    pos: noun
    gender: f
    gloss_de: 'Feta (Schafs-/Ziegenkäse in Salzlake)'
    notes: 'Endung -α → weiblich: η φέτα. Geschützte Ursprungsbezeichnung; im Dialog als Antwort auf Τι τυρί είναι αυτό;'

  - lemma: πορτοκάλι
    pos: noun
    gender: n
    gloss_de: 'Orange (Frucht)'
    notes: 'Endung -ι → sächlich: το πορτοκάλι. Verwandt mit πορτοκαλάδα (Orangenlimonade, Kap. 5) — dieselbe Wortfamilie. Beispiel beim Zeigen: εκείνο είναι πορτοκάλι.'

  - lemma: μήλο
    pos: noun
    gender: n
    gloss_de: 'Apfel'
    notes: 'Endung -ο → sächlich: το μήλο. Deutsch „der Apfel" männlich, griechisch το μήλο sächlich (Genus-Kontrast).'

  - lemma: ψωμί
    pos: noun
    gender: n
    gloss_de: 'Brot'
    notes: 'Endung -ι → sächlich: το ψωμί. Auf der letzten Silbe betont (pso-MÍ). Im Dialog: φρέσκο ψωμί.'

  - lemma: τυρί
    pos: noun
    gender: n
    gloss_de: 'Käse'
    notes: 'Endung -ί → sächlich: το τυρί. Auf der letzten Silbe betont. Im Dialog: Τι τυρί είναι αυτό; → Φέτα.'

  - lemma: ψάρι
    pos: noun
    gender: n
    gloss_de: 'Fisch'
    notes: 'Endung -ι → sächlich: το ψάρι. Im Dialog und in der Landeskunde: φρέσκο ψάρι (frischer Fisch, Marktruf).'

  - lemma: λάδι
    pos: noun
    gender: n
    gloss_de: 'Öl, Olivenöl'
    notes: 'Endung -ι → sächlich: το λάδι. Im Alltag meist Olivenöl. Verwandt mit ελιά (Olive).'

  - lemma: αγγούρι
    pos: noun
    gender: n
    gloss_de: 'Gurke'
    notes: 'Endung -ι → sächlich: το αγγούρι. Doppel-γγ wird wie „ng" gesprochen (an-GÚ-ri). Deutsch „die Gurke" weiblich, griechisch το αγγούρι sächlich (Genus-Kontrast).'

grammar_introduced:
  - id: fragewoerter-demonstrativa
    label_de: 'Fragewörter (τι, ποιος, πού) und Demonstrativa (αυτός/εκείνος). τι (was, Kap. 3) und πού (wo, Kap. 6) konsolidiert und unveränderlich; ποιος (wer/welcher) und die Demonstrativa αυτός (das hier, zu εδώ) / εκείνος (das dort, zu εκεί) folgen dem -ος/-η/-ο-Genus-Muster aus Kap. 8. Kernsatz Τι είναι αυτό; mit αυτό als neutraler Standardform beim Fragen nach einer unbekannten Sache; prädikative Antwort Αυτό είναι ντομάτα. Nur Nominativ Singular, kein Plural, kein anderer Kasus. Konstruktion Demonstrativ + Artikel + Nomen (αυτό το ψάρι) nur rezeptiv als feste Wendung.'

